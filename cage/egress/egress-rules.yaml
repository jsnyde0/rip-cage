version: 1
default: allow
# IOC-floor audit (rip-cage-ta1o.1): pure destination router — only host-based
# match keys are enforceable. Rules reduced per three-class audit below.
#
# Class (a) — path_prefix/path_regex/method_in on exfil sinks (webhook receivers,
#   paste services, file drops): DROPPED. The router cannot inspect method/path.
#   Residual: POST to an allowlisted discord.com/pastebin.com/etc. host passes
#   through unexamined. Mediator-layer (clawpatrol) is the right altitude for
#   method/path-aware exfil rules (ADR-026 D2). Hosts that are pure-exfil sinks
#   with no legitimate use (webhook.site, interactsh domains, tunnels, DDNS) are
#   still blocked at destination level (class b below).
#
# Class (b) — host/host_suffix rules with no method/path qualifiers: KEPT.
#   These are pure-exfil or pure-OAST hosts with no legitimate agent use.
#   Destination-level denial is appropriate and effective.
#
# Class (c) — DoH endpoint path_prefix rules (google-doh, cloudflare-doh):
#   DROPPED. In block-mode default-deny, non-allowlisted DoH hosts are already
#   blocked at destination level; the path_prefix rule only mattered if the host
#   was explicitly allowlisted. The router cannot inspect paths. Residual: if an
#   operator explicitly allowlists dns.google or cloudflare-dns.com, DoH queries
#   will pass. nextdns-doh (host_suffix rule) is KEPT — host-only match works.
#
# Rules that denied host-identifiable exfil apexes are preserved as destination
# denials. Broad platform hosts (discord.com, api.telegram.org, pastebin.com, etc.)
# are removed from the floor — they should live in mediator-layer policy.

rules:
  # === OAST / pentest infra (class b — pure-exfil hosts, no legitimate agent use) ===

  - id: webhook-site
    deny: true
    match:
      host: "webhook.site"
    reason: "webhook.site is an OAST/exfiltration service"
    category: webhook-receiver

  - id: interactsh
    deny: true
    match:
      host_suffix: ".interact.sh"
    reason: "interactsh is OAST infrastructure"
    category: oast

  - id: interactsh-oast-pro
    deny: true
    match:
      host_suffix: ".oast.pro"
    reason: "interactsh alt domain (oast.pro) is OAST infrastructure"
    category: oast

  - id: interactsh-oast-me
    deny: true
    match:
      host_suffix: ".oast.me"
    reason: "interactsh alt domain (oast.me) is OAST infrastructure"
    category: oast

  - id: interactsh-oast-fun
    deny: true
    match:
      host_suffix: ".oast.fun"
    reason: "interactsh alt domain (oast.fun) is OAST infrastructure"
    category: oast

  - id: interactsh-oast-site
    deny: true
    match:
      host_suffix: ".oast.site"
    reason: "interactsh alt domain (oast.site) is OAST infrastructure"
    category: oast

  - id: burp-collaborator
    deny: true
    match:
      host_suffix: ".burpcollaborator.net"
    reason: "Burp Collaborator is OAST infrastructure"
    category: oast

  - id: canarytokens-com
    deny: true
    match:
      host: "canarytokens.com"
    reason: "Canarytokens is OAST infrastructure"
    category: oast

  - id: canarytokens-org
    deny: true
    match:
      host: "canarytokens.org"
    reason: "Canarytokens is OAST infrastructure"
    category: oast

  # === Tunnels (class b — all methods; tunnel destination is always suspicious) ===

  - id: ngrok
    deny: true
    match:
      host_suffix: ".ngrok.io"
    reason: "ngrok tunnels are an exfiltration vector"
    category: tunnel

  - id: ngrok-free
    deny: true
    match:
      host_suffix: ".ngrok-free.app"
    reason: "ngrok tunnels are an exfiltration vector"
    category: tunnel

  - id: ngrok-app
    deny: true
    match:
      host_suffix: ".ngrok.app"
    reason: "ngrok tunnels are an exfiltration vector"
    category: tunnel

  - id: ngrok-dev
    deny: true
    match:
      host_suffix: ".ngrok.dev"
    reason: "ngrok tunnels are an exfiltration vector"
    category: tunnel

  - id: trycloudflare
    deny: true
    match:
      host_suffix: ".trycloudflare.com"
    reason: "Cloudflare tunnels are an exfiltration vector"
    category: tunnel

  - id: localhost-run
    deny: true
    match:
      host: "localhost.run"
    reason: "localhost.run is a tunnel exfiltration vector"
    category: tunnel

  - id: serveo
    deny: true
    match:
      host: "serveo.net"
    reason: "serveo.net is a tunnel exfiltration vector"
    category: tunnel

  - id: localtunnel
    deny: true
    match:
      host_suffix: ".loca.lt"
    reason: "localtunnel is a tunnel exfiltration vector"
    category: tunnel

  # === Dynamic DNS (class b — no legitimate agent use for exfil-capable DDNS) ===

  - id: duckdns
    deny: true
    match:
      host_suffix: ".duckdns.org"
    reason: "DuckDNS dynamic DNS can mask exfiltration endpoints"
    category: dynamic-dns

  - id: noip
    deny: true
    match:
      host_suffix: ".noip.com"
    reason: "No-IP dynamic DNS can mask exfiltration endpoints"
    category: dynamic-dns

  - id: dynu
    deny: true
    match:
      host_suffix: ".dynu.net"
    reason: "Dynu dynamic DNS can mask exfiltration endpoints"
    category: dynamic-dns

  - id: hopto
    deny: true
    match:
      host_suffix: ".hopto.org"
    reason: "hopto.org dynamic DNS can mask exfiltration endpoints"
    category: dynamic-dns

  # === DoH resolvers (partial — class c audit) ===
  # google-doh and cloudflare-doh: DROPPED (path_prefix not enforceable by router;
  # these hosts are blocked by default-deny if not explicitly allowlisted).
  # nextdns-doh: KEPT — host_suffix match works in the pure router.

  - id: nextdns-doh
    deny: true
    match:
      host_suffix: ".nextdns.io"
    reason: "NextDNS DoH bypasses container DNS controls (host-suffix deny retained)"
    category: doh
