# Terminal type — enables 256 colors and proper escape sequences
set -g default-terminal "tmux-256color"

# True color (24-bit) passthrough from the host terminal
set -as terminal-features ",xterm-256color:RGB"

# UTF-8 support for box-drawing characters and Unicode
set -ga terminal-overrides ',*:UTF-8'

# Synchronized output (DEC mode 2026) — eliminates TUI flickering
# Claude Code emits 4000-6700 scroll events/sec during streaming;
# sync batches them into single atomic redraws
set -as terminal-features ",*:sync"

# Mouse support
set -g mouse on

# Generous scrollback for long agent sessions
set -g history-limit 50000

# Don't wait for escape sequences — makes the TUI feel snappier
set -sg escape-time 10

# Drag-select that sticks on Ghostty: remove the bindings that auto-copy and
# clear selection on mouse-release. Copy stays explicit (⌘C in Ghostty, or
# Ctrl+Shift+C). Wheel-scroll still enters copy-mode for Claude scrollback.
setw -g mode-keys vi
unbind -T copy-mode-vi MouseDragEnd1Pane
unbind -T copy-mode-vi MouseDown1Pane
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel

# Fast config reload — useful while iterating
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# Each viewing client sizes the window independently
setw -g aggressive-resize on

# Forward window title to the host terminal
set -g set-titles on
set -g set-titles-string "rip-cage: #W"

# Modifier-aware keys (Shift+Enter for Claude Code, etc.)
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
