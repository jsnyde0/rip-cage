name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint — shellcheck all bash scripts
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint rc
        run: shellcheck -x rc

      - name: Lint init-rip-cage.sh
        run: shellcheck -x init-rip-cage.sh

      - name: Lint hooks
        run: shellcheck -x hooks/*.sh

      - name: Lint bd-wrapper.sh
        run: shellcheck -x bd-wrapper.sh

      - name: Lint test-prerequisites.sh
        run: shellcheck -x tests/test-prerequisites.sh

  # ---------------------------------------------------------------------------
  # Job 2: Build — verify multi-stage Dockerfile compiles (Go + Rust + Debian)
  # ---------------------------------------------------------------------------
  build:
    name: Build (docker build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t rip-cage:release-test .

  # ---------------------------------------------------------------------------
  # Job 3: Release — build and push Docker image to GHCR on version tags
  # Requires lint and build to pass first (ADR-008 D4)
  # ---------------------------------------------------------------------------
  release:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: [lint, build]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Verify VERSION matches tag
        # ADR-008 D3: VERSION file is the single source of truth.
        # The git tag and VERSION file must agree; if they diverge the release is invalid.
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          file_version="$(cat VERSION)"
          if [[ "$file_version" != "$tag_version" ]]; then
            echo "Error: VERSION file ($file_version) does not match git tag ($GITHUB_REF_NAME)" >&2
            exit 1
          fi
          echo "VERSION matches tag: $file_version"

      # Multi-arch publish (ADR-008 D6, post-v0.2.0). Apple Silicon is a primary
      # rip-cage audience (ADR-008 D5 names macOS / bash 3.2 explicitly); shipping
      # only linux/amd64 would force Rosetta on M1/M2 and defeat the <90s
      # first-run target. QEMU + buildx emulates arm64 on the amd64 runner.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # GHCR-public-visibility one-time ceremony note:
      # After the first successful push to a NEW package, GHCR defaults the
      # package's visibility to PRIVATE. Set it to Public at:
      #   https://github.com/users/jsnyde0/packages/container/rip-cage/settings
      # Until that's done, unauthenticated `docker pull` from end users fails
      # silently and falls back to local build — defeating ADR-008 D6's
      # first-run-fast promise.
      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
