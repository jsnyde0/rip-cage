name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint — shellcheck all bash scripts (pinned via make lint)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint (pinned shellcheck via make lint)
        # make lint runs koalaman/shellcheck:v0.11.0 via docker — same image
        # and file list used locally, so CI and local dev never diverge.
        # ubuntu-latest has docker pre-installed.
        run: make lint

  # ---------------------------------------------------------------------------
  # Job 2: Build — verify multi-stage Dockerfile compiles (Go + Rust + Debian)
  # ---------------------------------------------------------------------------
  build:
    name: Build (docker build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yq (mikefarah v4, required by rc generate-dockerfile)
        run: |
          sudo curl -fsSL -o /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Generate composed Dockerfile from dist/default-tools.yaml
        # rip-cage-wlwc.12: CI builds the default-composed image (CC+pi+dcg+ssh-bypass)
        # from the maintainer-authored dist/default-tools.yaml manifest.
        run: RC_MANIFEST_GLOBAL=dist/default-tools.yaml ./rc generate-dockerfile > /tmp/Dockerfile.composed

      - name: Build Docker image
        # The multi-stage build compiles the Go beads binary, the Rust DCG binary,
        # and the CC+pi+dcg+ssh-bypass recipe steps before assembling the runtime image.
        # A successful build confirms the full toolchain + composition works.
        run: docker build -t rip-cage:ci-test -f /tmp/Dockerfile.composed .

  # ---------------------------------------------------------------------------
  # Job 3: Test (host-only) — single driver: tests/run-host.sh with --host-only
  #
  # The driver skips the NEEDS_CONTAINER denylist (tests requiring a live cage
  # or API key) and runs everything else. The ADR-023 RC_CONFIG_GLOBAL fixture
  # is provisioned inside run-host.sh (driver-level per ADR-023 D6); no
  # duplicate step needed here.
  #
  # Tests excluded via NEEDS_CONTAINER denylist (see tests/run-host.sh):
  #   - test-agent-cli.sh      full rc up / rc attach / rc destroy flow
  #   - test-pi-e2e.sh         requires pi credentials + running container
  #   - test-pi-install.sh     requires pre-built rip-cage:latest image
  #   - test-pi-auth-mount.sh  inspects container env + mounts (live cage)
  #   - test-pi-cage-context.sh inspects CLAUDE.md inside live cage
  #
  # Full integration tests need Docker-in-Docker or a self-hosted runner.
  # They are tracked in the backlog (rip-cage-rat follow-up).
  # ---------------------------------------------------------------------------
  test:
    name: Test (host-only, no container)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      # Host-test runtime deps (not validation tools — analogous to uv above).
      # zsh: test-completions.sh generates + runs zsh completions.
      # yq (mikefarah v4): rc's allowlist/config/egress commands parse YAML with
      #   v4 dot-notation; ubuntu-latest ships neither. Matches the host
      #   prerequisite a developer already has (brew install yq on macOS).
      - name: Install host-test deps (zsh, mikefarah yq v4)
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh
          sudo curl -fsSL -o /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Verify rc --version works
        run: ./rc --version

      - name: Run host-only tests
        run: bash tests/run-host.sh --host-only
