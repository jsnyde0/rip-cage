# manifest/default-tools.yaml - maintainer-authored default-composed tool manifest
#
# This is the DEFAULT CONFIG for the DISTRIBUTION LAYER (GHCR published image +
# brew formula). It composes the floor tools + the CC, pi, dcg, and ssh-bypass
# recipes so that out-of-box rc up gives CC+pi+dcg+ssh-bypass.
#
# DESIGN (ADR-005 D12, ADR-027 D3):
#   - The 'blessing' of the default tool set lives HERE (user-editable data),
#     NOT in rc code or the in-repo default manifest (_manifest_default_yaml in rc).
#   - The in-repo default manifest (_manifest_default_yaml) is floor-only: beads,
#     dolt, gh. A local rc build without configuration produces a floor-only image.
#   - The published image is built with:
#         RC_MANIFEST_GLOBAL=manifest/default-tools.yaml ./rc build
#     No compose mechanism in rc; no auto-wiring. An agent copies recipe fragments
#     from examples/ into this file and runs rc build. rip-cage builds no plumbing.
#
# Parallel to egress observe-mode default: just as egress ships observe-mode as
# data (egress-rules.yaml), the default tool set ships as data here, not in rc code.
#
# HOW TO COMPOSE: see examples/{claude,pi,dcg,ssh-bypass}/ for per-recipe READMEs.
# To add a new tool: copy a manifest-fragment.yaml entry here, run rc build.
# To remove a tool: delete its entry, run rc build.
# NO rc source edits required for any of the above.
#
# GENERATED content note: the install_cmd base64 blobs in the recipe entries below
# mirror the canonical recipe files in examples/. Re-run each recipe's
# build-fragment.sh and copy the result here to update.

version: 1
tools:
  # ---------------------------------------------------------------------------
  # FLOOR TOOLS - always present, built into the base Dockerfile
  # ---------------------------------------------------------------------------

  - name: beads
    archetype: TOOL
    version_pin: "bundled"
    egress:
      - api.github.com
    mounts: []

  - name: dolt
    archetype: TOOL
    version_pin: "bundled"
    egress:
      - doltremoteapi.dolthub.com
    mounts: []

  - name: gh
    archetype: TOOL
    version_pin: "bundled"
    egress:
      - api.github.com
      - github.com
    mounts: []

  # ---------------------------------------------------------------------------
  # CC + PI BINARY TOOLS - npm-installed in base Dockerfile; no install_cmd.
  # The claude-recipe and pi-recipe entries below add wrappers + guards on top.
  # ---------------------------------------------------------------------------

  - name: claude
    archetype: TOOL
    version_pin: "bundled"
    egress:
      - api.anthropic.com
      - statsig.anthropic.com
      - statsig.com
    mounts: []

  - name: pi
    archetype: TOOL
    version_pin: "bundled"
    egress: []
    mounts: []

  # ---------------------------------------------------------------------------
  # RECIPES - composable fragments from examples/claude, pi, dcg, ssh-bypass
  # These are the entries an operator copies from examples/ into their own
  # ~/.config/rip-cage/tools.yaml to compose the same default-composition locally.
  # ---------------------------------------------------------------------------

  # Claude Code session-wrapper + managed-settings floor-lock recipe.
  # Source: examples/claude/manifest-fragment.yaml
  # See examples/claude/ for details and the build-fragment.sh generator.
  - name: claude-recipe
    archetype: TOOL
    version_pin: "bundled-recipe"
    install_cmd: ": && mkdir -p /etc/rip-cage && echo '' | base64 -d > /usr/local/bin/claude && chown root:root /usr/local/bin/claude && chmod 0755 /usr/local/bin/claude && mkdir -p /etc/claude-code && chown root:root /etc/claude-code && chmod 0755 /etc/claude-code && echo '' | base64 -d > /etc/claude-code/managed-settings.json && chown root:root /etc/claude-code/managed-settings.json && chmod 0644 /etc/claude-code/managed-settings.json && echo '' | base64 -d > /etc/rip-cage/cage-claude.md && chown root:root /etc/rip-cage/cage-claude.md && chmod 0644 /etc/rip-cage/cage-claude.md"
    egress: []
    mounts: []

  # Pi coding agent launch-hardening + DCG guard extension recipe.
  # Source: examples/pi/manifest-fragment.yaml
  # See examples/pi/ for details and the build-fragment.sh generator.
  - name: pi-recipe
    archetype: TOOL
    version_pin: "bundled-recipe"
    init: '_rc_pi_ext_dir="${PI_CODING_AGENT_DIR:-/home/agent/.pi/agent}/extensions"; if ! mkdir -p "$_rc_pi_ext_dir" 2>/tmp/rc-pi-ext-mkdir-err; then echo "[rip-cage] WARNING: could not create ${_rc_pi_ext_dir} (herdr''s boot-time ''integration install pi'' will fail with ''extension directory not found'', rip-cage-fwp3): $(cat /tmp/rc-pi-ext-mkdir-err 2>/dev/null)" >&2; fi; rm -f /tmp/rc-pi-ext-mkdir-err; true'
    install_cmd: ": && mkdir -p /etc/rip-cage/pi /etc/rip-cage && echo '' | base64 -d > /etc/rip-cage/cage-pi.md && chown root:root /etc/rip-cage/cage-pi.md && chmod 0644 /etc/rip-cage/cage-pi.md"
    egress: []
    mounts: []

  - name: dcg
    archetype: TOOL
    version_pin: "v0.4.0"
    egress: []
    build_source:
      builder_image: "rust:1-slim-trixie"
      build_script: "tests/fixtures/build-dcg-from-source.sh"
      output_path: "/usr/local/bin/dcg"
    mounts: []

  # DCG engine wiring - guard wrapper + cage config + sentinel fixture.
  # Source: examples/dcg/manifest-fragment.yaml (dcg-wiring entry)
  # launch_args ships OPEN by default (ADR-027 D1, FIRM 2026-07-02); pi's own
  # extension auto-discovery paths stay live. See examples/dcg/README.md for
  # the locked opt-in variant (documented there, not shipped here).
  - name: dcg-wiring
    archetype: TOOL
    version_pin: "bundled-recipe"
    required: true
    assert_loaded: "test -x /usr/local/lib/rip-cage/bin/dcg-guard && test -f /usr/local/lib/rip-cage/dcg/config.toml"
    install_cmd: ": && mkdir -p /usr/local/lib/rip-cage/bin /usr/local/lib/rip-cage/dcg/fixtures /usr/local/lib/rip-cage/recipe-tests /etc/rip-cage/pi && echo '' | base64 -d > /usr/local/lib/rip-cage/bin/dcg-guard && chown root:root /usr/local/lib/rip-cage/bin/dcg-guard && chmod 0755 /usr/local/lib/rip-cage/bin/dcg-guard && echo '' | base64 -d > /usr/local/lib/rip-cage/dcg/config.toml && chown root:root /usr/local/lib/rip-cage/dcg/config.toml && chmod 0644 /usr/local/lib/rip-cage/dcg/config.toml && echo '' | base64 -d > /usr/local/lib/rip-cage/dcg/fixtures/ripcage-testsentinel-rule.yaml && chown root:root /usr/local/lib/rip-cage/dcg/fixtures/ripcage-testsentinel-rule.yaml && chmod 0644 /usr/local/lib/rip-cage/dcg/fixtures/ripcage-testsentinel-rule.yaml && echo '' | base64 -d > /usr/local/lib/rip-cage/recipe-tests/dcg-smoke.sh && chown root:root /usr/local/lib/rip-cage/recipe-tests/dcg-smoke.sh && chmod 0755 /usr/local/lib/rip-cage/recipe-tests/dcg-smoke.sh && chown root:root /usr/local/lib/rip-cage/recipe-tests && echo '' | base64 -d > /etc/rip-cage/pi/dcg-gate.ts && chown root:root /etc/rip-cage/pi/dcg-gate.ts && chmod 0644 /etc/rip-cage/pi/dcg-gate.ts && chown root:root /etc/rip-cage/pi && chmod 0755 /etc/rip-cage/pi"
    launch_args: ["-e", "/etc/rip-cage/pi/dcg-gate.ts"]
    egress: []
    mounts: []

  # SSH-bypass blocker hook recipe.
  # Source: examples/ssh-bypass/manifest-fragment.yaml
  # See examples/ssh-bypass/ for details and the build-fragment.sh generator.
  # NOTE: in this default composition, the block-ssh-bypass.sh hook is activated via
  # the claude-recipe's managed-settings.json (the floor-lock slot, written above).
  # The hook fires root-owned through managed-settings — no per-user settings.json
  # merge needed when using this default-tools.yaml composition.
  - name: ssh-bypass-hook
    archetype: TOOL
    version_pin: "bundled-recipe"
    required: true
    assert_loaded: "test -x /usr/local/lib/rip-cage/hooks/block-ssh-bypass.sh"
    install_cmd: ": && mkdir -p /usr/local/lib/rip-cage/hooks /usr/local/lib/rip-cage/recipe-tests && echo '' | base64 -d > /usr/local/lib/rip-cage/hooks/block-ssh-bypass.sh && chown root:root /usr/local/lib/rip-cage/hooks/block-ssh-bypass.sh && chmod 0755 /usr/local/lib/rip-cage/hooks/block-ssh-bypass.sh && echo '' | base64 -d > /usr/local/lib/rip-cage/recipe-tests/ssh-bypass-smoke.sh && chown root:root /usr/local/lib/rip-cage/recipe-tests/ssh-bypass-smoke.sh && chmod 0755 /usr/local/lib/rip-cage/recipe-tests/ssh-bypass-smoke.sh && chown root:root /usr/local/lib/rip-cage/recipe-tests"
    egress: []
    mounts: []
