# Terminal type — enables 256 colors and proper escape sequences
set -g default-terminal "tmux-256color"

# True color (24-bit) passthrough from the host terminal
set -as terminal-features ",xterm-256color:RGB"

# UTF-8 support for box-drawing characters and Unicode
set -ga terminal-overrides ',*:UTF-8'

# Synchronized output (DEC mode 2026) — eliminates TUI flickering
# Claude Code emits 4000-6700 scroll events/sec during streaming;
# sync batches them into single atomic redraws
set -as terminal-features ",*:sync"

# Mouse support
set -g mouse on

# Copy-on-select — drag-select then release lands the text on the HOST clipboard
# via OSC 52 (tmux's default MouseDragEnd1Pane already copy-pipe-and-cancels; this
# relays that buffer up to whatever terminal you attached from). No ⌘C, no y keystroke,
# no sticky-select needed. Requires the host terminal to honor OSC 52 clipboard writes.
set -g set-clipboard on

# Generous scrollback for long agent sessions
set -g history-limit 50000

# Don't wait for escape sequences — makes the TUI feel snappier
set -sg escape-time 10

# Keep dead panes visible and auto-respawn — guards against accidental exit in long agent sessions
set-option -g remain-on-exit on
set-hook   -g pane-died 'respawn-pane -c /workspace'
