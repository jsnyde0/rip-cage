version: 1
tools:
  # mitmproxy mediator provider — copy these two entries into your tools.yaml to enable
  # mitmproxy as the in-cage egress mediator for credential injection (ADR-026 D5).
  #
  # Two entries are required:
  #   1. mitmproxy-bin (TOOL): installs mitmproxy into the image at build time,
  #      creates the rip-mitmproxy system user, and places the injection addon.
  #   2. mitmproxy (MEDIATOR): bakes start/teardown hooks into the registry for
  #      dispatch at cage init via the mediator lifecycle (ADR-026 D5).
  #
  # After adding, run: rc build
  # Then configure the workspace .rip-cage.yaml (see compose-rc-with-mitmproxy.md).
  #
  # mitmproxy is a Python application. It is installed into a dedicated venv at
  # /opt/rip-cage-mitmproxy/ (root-owned, as required by ADR-005 D11) to avoid
  # interference with the rip-proxy venv at /opt/rip-cage-proxy/.
  #
  # glibc/runtime note: mitmproxy 11.x requires Python >= 3.11 and glibc >= 2.28.
  # The rip-cage Debian bookworm runtime (python3.11, glibc 2.36) satisfies both.
  #
  # See examples/compose-rc-with-mitmproxy.md for a full setup walkthrough.

  # TOOL entry: installs mitmproxy at image build time.
  # Creates the rip-mitmproxy system user (for uid-exemption loop prevention,
  # ADR-026 D5) and places the injection addon at /opt/rip-cage-mitmproxy/addon/.
  # Root-owned throughout — ADR-005 D11.
  - name: mitmproxy-bin
    archetype: TOOL
    # mitmproxy 11.0.2 — released 2025-06-10, supports Python 3.11+.
    # PyPI: https://pypi.org/project/mitmproxy/11.0.2/
    version_pin: "11.0.2"
    # The install_cmd also writes the injection addon inline so it is baked into the
    # image without a separate COPY step (single-command constraint — no newlines).
    # The addon replaces the Authorization header placeholder with the real secret
    # read from RIPCAGE_MEDIATOR_BEARER_SECRET at mitmproxy process startup.
    # useradd -m: create home dir (mitmproxy writes its CA cert to ~/.mitmproxy/).
    # -d /opt/rip-cage-mitmproxy-home: put it under /opt alongside the venv.
    # The venv is separate at /opt/rip-cage-mitmproxy/ (root-owned).
    install_cmd: "useradd -r -s /usr/sbin/nologin -m -d /opt/rip-cage-mitmproxy-home rip-mitmproxy && python3 -m venv /opt/rip-cage-mitmproxy && /opt/rip-cage-mitmproxy/bin/pip install --no-cache-dir mitmproxy==11.0.2 && mkdir -p /opt/rip-cage-mitmproxy/addon && printf '%s\\n' 'import os' '' 'def request(flow):' '    real_secret = os.environ.get(\"RIPCAGE_MEDIATOR_BEARER_SECRET\", \"\")' '    if not real_secret:' '        return' '    placeholder = os.environ.get(\"RIPCAGE_MEDIATOR_PLACEHOLDER\", \"\")' '    auth_header = flow.request.headers.get(\"authorization\", \"\")' '    if placeholder and auth_header != f\"Bearer {placeholder}\":' '        return' '    flow.request.headers[\"authorization\"] = f\"Bearer {real_secret}\"' > /opt/rip-cage-mitmproxy/addon/inject_credential.py && chmod 644 /opt/rip-cage-mitmproxy/addon/inject_credential.py"
    # mitmproxy download happens via pip at image build time only.
    # No runtime egress needed — mitmdump originates traffic as rip-mitmproxy uid,
    # which is exempted from the REDIRECT rule (loop prevention, init-firewall.sh Step 1a).
    egress:
      - pypi.org
      - files.pythonhosted.org
    mounts: []

  # MEDIATOR entry: bakes start/teardown hooks into /etc/rip-cage/mediators/mitmproxy/.
  # The start hook launches mitmdump in regular (CONNECT-proxy) mode under the
  # rip-mitmproxy uid. The router sends an HTTP CONNECT to 127.0.0.1:8080 for
  # allowed traffic (set network.http.forward_to: "127.0.0.1:8080" in .rip-cage.yaml).
  #
  # Hook-bounds: no DCG-config writes, no PATH=, no /etc/rip-cage/ writes,
  # no iptables/nft, no RIP_CAGE_EGRESS — passes the MEDIATOR validator (ADR-005 D11).
  - name: mitmproxy
    archetype: MEDIATOR
    version_pin: "11.0.2"
    # rip-mitmproxy: dedicated system user created by the mitmproxy-bin TOOL entry above.
    # init-firewall.sh Step 1a reads this field from /etc/rip-cage/mediators/mitmproxy/run_as_uid
    # and exempts the uid from the OUTPUT REDIRECT rule (loop prevention, ADR-026 D5).
    run_as_uid: "rip-mitmproxy"
    hooks:
      # start: called by the mediator lifecycle dispatcher at cage init.
      # Launches mitmdump in regular mode (speaks HTTP CONNECT — that is what
      # rip-cage's router sends on ALLOW via _connect_via_mediator).
      # --listen-host 127.0.0.1: loopback only — the router is co-located.
      # --listen-port 8080: matches the network.http.forward_to address below.
      # -s: load the injection addon from the venv's addon directory.
      # --set connection_strategy=eager: connect to upstream eagerly (not lazy)
      #   so the addon fires even on the first byte (avoids the lazy-connect
      #   false-green where the addon runs but the CONNECT upstream hasn't formed yet).
      # Logs go to /tmp/rip-cage-mediator-mitmproxy.log (cage-lifetime, agent-readable).
      start: "su -s /bin/sh rip-mitmproxy -c '/opt/rip-cage-mitmproxy/bin/mitmdump --mode regular --listen-host 127.0.0.1 --listen-port 8080 -s /opt/rip-cage-mitmproxy/addon/inject_credential.py --set connection_strategy=eager > /tmp/rip-cage-mediator-mitmproxy.log 2>&1 &'"
      # teardown: send SIGTERM to any mitmdump process owned by rip-mitmproxy.
      teardown: "pkill -u rip-mitmproxy mitmdump || true"
