# Full fixture for rip-cage-bnf.2 host-config translation tests
# Covers: macOS-only directives, IdentityFile paths, Include (in-home + out-of-home),
#         host-only directives, ADR-014 D2 directives.

# macOS-only directive (should survive but be covered by IgnoreUnknown shim)
UseKeychain yes
AddKeysToAgent yes

# Include inside ~/.ssh/ → should be recursively merged
Include _SSH_HOME_/included.conf

# Include outside ~/.ssh/ → should be commented out
Include /etc/orbstack/ssh/config

Host github-work
  HostName github.com
  User git
  IdentityFile ~/.ssh/id_ed25519_work
  IdentitiesOnly yes
  # host-only directives that should be stripped:
  ProxyCommand nc -X connect -x proxy.example.com:8080 %h %p
  ProxyJump jumphost.example.com
  ControlMaster auto
  ControlPath ~/.ssh/cm_%r@%h:%p
  IdentityAgent /run/user/1000/gnupg/S.gpg-agent.ssh
  # ADR-014 D2 directives that should be overridden:
  BatchMode no
  StrictHostKeyChecking accept-new

Host github-personal
  HostName github.com
  User git
  IdentityFile ~/.ssh/id_ed25519_personal
  IdentitiesOnly yes
  UserKnownHostsFile ~/.ssh/personal_known_hosts
  GlobalKnownHostsFile ~/.ssh/global_known_hosts

Host *
  ServerAliveInterval 60
  # Another ADR-014 D2 override candidate
  BatchMode no
