# Fixture where host already has a Host github.com block.
# Translation should carry it over (with transforms) and NOT append a synthesized block.
Host github.com
  User git
  IdentityFile ~/.ssh/id_ed25519_personal
  IdentitiesOnly yes
  # host-only directive inside github.com block → stripped
  ControlMaster auto
  ControlPath ~/.ssh/cm_%r@%h:%p
  BatchMode no
