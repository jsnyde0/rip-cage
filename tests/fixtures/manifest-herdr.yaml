version: 1
tools:
  - name: herdr
    archetype: TOOL
    # Pinned release: github.com/ogulcancelik/herdr v0.6.10
    # Distribution: prebuilt release binaries (no cargo build needed).
    # Targets: herdr-linux-x86_64 (amd64), herdr-linux-aarch64 (arm64).
    # Asset URL pattern: releases/download/v<version>/herdr-linux-<arch>
    # Binary placed at /usr/local/bin/herdr via 'install -m 755' (root-owned, ADR-005 D9).
    # Server start is dispatched via the baked MULTIPLEXER registry in init-rip-cage.sh (RC_MULTIPLEXER=herdr).
    # herdr CLI provides bash-CLI-over-bash control surface (SKILL.md: HERDR_ENV=1 env var
    # is set by herdr in managed panes; herdr pane/workspace/tab/wait CLIs over unix socket).
    version_pin: "0.6.10"
    # Arch-adaptive install: detect arch at Dockerfile RUN time, download the matching binary.
    # x86_64 → herdr-linux-x86_64, aarch64 → herdr-linux-aarch64.
    # SHA-256 checksums sourced from GitHub API release asset digest field (ogulcancelik/herdr v0.6.10)
    # and cross-verified by downloading each asset and running sha256sum locally.
    # x86_64:  78d298d5a1ef076b4607e8e3c92d98f5de9f0cb30daf31aa910a1a6e9abb4fa1
    # aarch64: b3144a41df364f0541bbbdfe840fa61dbd67daf6e313ee317fe495d2ccf4927a
    install_cmd: "ARCH=$(uname -m) && if [ \"$ARCH\" = \"aarch64\" ]; then TARGET=aarch64; EXPECTED_SHA=b3144a41df364f0541bbbdfe840fa61dbd67daf6e313ee317fe495d2ccf4927a; else TARGET=x86_64; EXPECTED_SHA=78d298d5a1ef076b4607e8e3c92d98f5de9f0cb30daf31aa910a1a6e9abb4fa1; fi && curl -fsSL \"https://github.com/ogulcancelik/herdr/releases/download/v0.6.10/herdr-linux-${TARGET}\" -o /tmp/herdr && echo \"${EXPECTED_SHA}  /tmp/herdr\" | sha256sum -c - && install -m 755 /tmp/herdr /usr/local/bin/herdr && rm -f /tmp/herdr"
    # herdr opens no external connections at runtime (unix socket only, localhost).
    # The download happens at image build time only; no runtime egress.
    # Declare github.com for the build-time download (IOC egress floor awareness).
    egress:
      - github.com
    mounts: []
