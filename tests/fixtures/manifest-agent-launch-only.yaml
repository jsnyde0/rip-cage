version: 1
tools:
  # Guard-free FAKE agent: ONLY a launch hook, no guard_path, no teardown.
  # rc never forces a guard — a guard-free agent is a first-class shape
  # (ADR-027 D3; containment is the floor, guards are composable recipes above it).
  - name: test-agent
    archetype: AGENT
    version_pin: "1.0.0"
    hooks:
      launch: "exec test-agent --workspace /workspace"
