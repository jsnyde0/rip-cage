version: 1
tools:
  # Fixture: a MEDIATOR provider for config-loader tests.
  # Used to seed the manifest so the allowed-set derivation accepts "my-proxy".
  - name: my-proxy
    archetype: MEDIATOR
    version_pin: "1.0.0"
    run_as_uid: "rip-mediator"
    hooks:
      start: "my-proxy start --listen 127.0.0.1:8080"
