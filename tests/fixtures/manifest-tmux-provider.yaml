version: 1
tools:
  # Fixture: tmux TOOL + MULTIPLEXER provider for rip-cage-61al.3 registry-dispatch test.
  # Used by test-multiplexer-lifecycle.sh to build a tmux-from-examples cage.
  # Two entries: the TOOL entry installs the binary; the MULTIPLEXER entry provides hooks.
  # tmux is no longer baked in the base image (ADR-005 D12).
  - name: tmux-bin
    archetype: TOOL
    version_pin: "3.4-debian"
    install_cmd: "apt-get install -y --no-install-recommends tmux"
    egress: []
    mounts: []
  - name: tmux
    archetype: MULTIPLEXER
    version_pin: "bundled"
    hooks:
      start: "tmux new-session -d -s rip-cage -c /workspace 2>/dev/null || true"
      attach: "tmux attach-session -t rip-cage 2>/dev/null || (tmux new-session -d -s rip-cage -c /workspace && tmux attach-session -t rip-cage)"
      new_session: "NEW=$(tmux list-sessions -F '#{session_name}' 2>/dev/null | awk 'BEGIN{n=2} /^rip-cage-[0-9]+$/{x=substr($0,10)+0; if(x>=n) n=x+1} END{print \"rip-cage-\" n}') && tmux new-session -d -s \"$NEW\" -c /workspace && tmux attach-session -t \"$NEW\""
