version: 1
tools:
  - name: agent-mail
    archetype: IN-CAGE-DAEMON
    # Pinned source: github.com/Dicklesworthstone/mcp_agent_mail_rust @ 8897497257c5fac79f7a3559cacf27fddc853d4a
    version_pin: "0.3.10"
    # start: --no-tui suppresses the TUI when stdout is not a TTY (main.rs:714-827).
    # Binds to 127.0.0.1:8765 by default (config.rs:1214-1215).
    # HTTP_HOST / HTTP_PORT env vars override if needed.
    # STORAGE_ROOT pins the storage dir to state_dir (config.rs:852-870).
    # Without STORAGE_ROOT, agent_mail defaults to ~/.local/share/mcp-agent-mail (XDG)
    # which does not exist in the cage (parent dir not created by init machinery).
    # Must match state_dir exactly so the pre-created dir is used.
    start: "STORAGE_ROOT=/var/lib/rip-cage-daemon/agent-mail mcp-agent-mail serve --no-tui"
    # /healthz bypasses bearer auth (lib.rs:57-60) — no token needed for health probe.
    # Aliases: /health/liveness, /health, /health/readiness also work.
    health: "curl -sf http://127.0.0.1:8765/healthz"
    # Container-local state dir (ADR-019 D1 extensions pattern).
    # Default XDG_DATA_HOME path: ~/.local/share/mcp-agent-mail/git_mailbox_repo (config.rs:852-870).
    # Overridable via STORAGE_ROOT env var.
    state_dir: "/var/lib/rip-cage-daemon/agent-mail"
    # Prebuilt release download: pinned v0.3.10 binary from GitHub Releases.
    # Direct asset URL — does NOT call install.sh (which has a cargo-build fallback
    # on download failure that is NOT viable: workspace Cargo.toml:160-224 patches
    # ~40 deps to unpublished sibling path-checkouts via [patch.crates-io]).
    # Targets: aarch64-unknown-linux-gnu, x86_64-unknown-linux-gnu.
    # Asset URL pattern: releases/download/v0.3.10/mcp-agent-mail-<target>.tar.xz
    # sha256 verified before extraction (sha256sum -c).
    # Both mcp-agent-mail and am binaries are extracted from the archive.
    install_cmd: "ARCH=$(uname -m) && TARGET=$([ \"$ARCH\" = \"aarch64\" ] && echo \"aarch64-unknown-linux-gnu\" || echo \"x86_64-unknown-linux-gnu\") && curl -fsSL \"https://github.com/Dicklesworthstone/mcp_agent_mail_rust/releases/download/v0.3.10/mcp-agent-mail-${TARGET}.tar.xz\" -o \"/tmp/mcp-agent-mail-${TARGET}.tar.xz\" && curl -fsSL \"https://github.com/Dicklesworthstone/mcp_agent_mail_rust/releases/download/v0.3.10/mcp-agent-mail-${TARGET}.tar.xz.sha256\" -o \"/tmp/mcp-agent-mail-${TARGET}.tar.xz.sha256\" && (cd /tmp && sha256sum -c \"mcp-agent-mail-${TARGET}.tar.xz.sha256\") && tar -xJf \"/tmp/mcp-agent-mail-${TARGET}.tar.xz\" -C /tmp && install -m 755 /tmp/mcp-agent-mail /usr/local/bin/mcp-agent-mail && install -m 755 /tmp/am /usr/local/bin/am && mkdir -p /var/lib/rip-cage-daemon/agent-mail && rm -f \"/tmp/mcp-agent-mail-${TARGET}.tar.xz\" \"/tmp/mcp-agent-mail-${TARGET}.tar.xz.sha256\" /tmp/mcp-agent-mail /tmp/am"
    # MCP fragment: HTTP transport (canonical per crates/*/setup.rs:1802-1808,219-224 @ 8897497).
    # /mcp/ endpoint requires bearer auth when HTTP_BEARER_TOKEN is set.
    # Default config (HTTP_BEARER_TOKEN unset): no auth required on /mcp/.
    # Set HTTP_BEARER_TOKEN env var to enable auth; use the same value in the Authorization header.
    # Token mechanism: static bearer token read from HTTP_BEARER_TOKEN env at startup (config.rs:1776).
    # Declared as a nested YAML object (NOT a quoted JSON string) so that yq → jq baking
    # produces a real JSON object in settings.json mcpServers (string form would bake as a
    # JSON string value, leaving .mcpServers["agent-mail"].type empty at runtime).
    mcp_fragment:
      type: http
      url: "http://127.0.0.1:8765/mcp/"
      headers:
        Authorization: "Bearer <HTTP_BEARER_TOKEN>"
    # Egress: localhost-only in default config.
    # External egress is opt-in via LLM_ENABLED=true + a provider *_API_KEY (config.rs:1324 default false).
    # 'am share' CLI is not invoked by 'serve' — not exposed here.
    # Declare empty: no external hosts contacted with default settings.
    egress: []
