version: 1
# Composed operator manifest for integration testing (rip-cage-l72i.7):
# DCG + herdr multiplexer + herdr-pi extension + pi-recipe + pi-subagent
#
# Fragment order: guard fragments (dcg, dcg-wiring) FIRST so the guard -e leads
# the assembled launch_args (ADR-027 D4).
#
# Assembled launch_args (in order) — OPEN by default (ADR-027 D1, FIRM
# 2026-07-02; rip-cage-p35a.1): dcg-wiring no longer contributes
# --no-extensions, so pi's own extension auto-discovery paths stay live even
# with DCG composed (accepted residual "vector-b" — see examples/dcg/README.md
# for the LOCKED opt-in variant that re-adds --no-extensions):
#   -e /etc/rip-cage/pi/dcg-gate.ts            <- dcg-wiring (DCG guard)
#   -e /etc/rip-cage/pi/herdr-ext/herdr-agent-state.ts  <- herdr-pi
#   -e /home/agent/.rc-context/pi-ext-subagent/index.ts <- pi-subagent
#
# Fragment provenance: tool entries are copied verbatim from:
#   examples/dcg/manifest-fragment.yaml       (dcg, dcg-wiring)
#   examples/pi/manifest-fragment.yaml        (pi-recipe)
#   examples/herdr/manifest-fragment.yaml     (herdr-bin, herdr MULTIPLEXER)
#   examples/herdr-pi/manifest-fragment.yaml  (herdr-pi)
#   examples/pi/subagent-fragment.yaml        (pi-subagent)
#
# Used by tests/test-multiplexer-lifecycle.sh under RC_E2E=1 to build and
# exercise a real composed cage asserting all three conjunction properties:
#   (1) herdr semantic status (screen_detection_skipped=true)
#   (2) DCG safety-stack guard present + loaded (rc test assertions pass)
#   (3) agent-dropped extension in pi auto-discovery IS loaded under the OPEN
#       default (accepted residual, ADR-027 D1) — the canary DOES load; the
#       binding safety check at this altitude is the DCG deny-probe (D2 below),
#       not extension isolation (retired-as-default per rip-cage-p35a.1)

tools:
  # [1/6] dcg -- build DCG binary from source (guard fragment, must be first)
  # Verbatim from examples/dcg/manifest-fragment.yaml
  - name: dcg
    archetype: TOOL
    version_pin: "v0.4.0"
    egress: []
    build_source:
      builder_image: "rust:1-slim-trixie"
      build_script: "tests/fixtures/build-dcg-from-source.sh"
      output_path: "/usr/local/bin/dcg"
    mounts: []

  # [2/6] dcg-wiring -- provision DCG guard engine + bake pi extension
  # Contributes launch_args: ["-e", "/etc/rip-cage/pi/dcg-gate.ts"] (OPEN default,
  # ADR-027 D1, FIRM — no --no-extensions; see examples/dcg/README.md for the
  # LOCKED opt-in variant)
  # Verbatim from examples/dcg/manifest-fragment.yaml
  - name: dcg-wiring
    archetype: TOOL
    version_pin: "bundled-recipe"
    required: true
    assert_loaded: "test -x /usr/local/lib/rip-cage/bin/dcg-guard && test -f /usr/local/lib/rip-cage/dcg/config.toml"
    install_cmd: ": && mkdir -p /usr/local/lib/rip-cage/bin /usr/local/lib/rip-cage/dcg/fixtures /usr/local/lib/rip-cage/recipe-tests /etc/rip-cage/pi && echo '' | base64 -d > /usr/local/lib/rip-cage/bin/dcg-guard && chown root:root /usr/local/lib/rip-cage/bin/dcg-guard && chmod 0755 /usr/local/lib/rip-cage/bin/dcg-guard && echo '' | base64 -d > /usr/local/lib/rip-cage/dcg/config.toml && chown root:root /usr/local/lib/rip-cage/dcg/config.toml && chmod 0644 /usr/local/lib/rip-cage/dcg/config.toml && echo '' | base64 -d > /usr/local/lib/rip-cage/dcg/fixtures/ripcage-testsentinel-rule.yaml && chown root:root /usr/local/lib/rip-cage/dcg/fixtures/ripcage-testsentinel-rule.yaml && chmod 0644 /usr/local/lib/rip-cage/dcg/fixtures/ripcage-testsentinel-rule.yaml && echo '' | base64 -d > /usr/local/lib/rip-cage/recipe-tests/dcg-smoke.sh && chown root:root /usr/local/lib/rip-cage/recipe-tests/dcg-smoke.sh && chmod 0755 /usr/local/lib/rip-cage/recipe-tests/dcg-smoke.sh && chown root:root /usr/local/lib/rip-cage/recipe-tests && echo '' | base64 -d > /etc/rip-cage/pi/dcg-gate.ts && chown root:root /etc/rip-cage/pi/dcg-gate.ts && chmod 0644 /etc/rip-cage/pi/dcg-gate.ts && chown root:root /etc/rip-cage/pi && chmod 0755 /etc/rip-cage/pi"
    egress: []
    mounts: []
    launch_args: ["-e", "/etc/rip-cage/pi/dcg-gate.ts"]

  # [3/6] pi-recipe -- bake cage-topology doc into image
  # Verbatim from examples/pi/manifest-fragment.yaml
  - name: pi-recipe
    archetype: TOOL
    version_pin: "bundled-recipe"
    install_cmd: ": && mkdir -p /etc/rip-cage/pi /etc/rip-cage && echo '' | base64 -d > /etc/rip-cage/cage-pi.md && chown root:root /etc/rip-cage/cage-pi.md && chmod 0644 /etc/rip-cage/cage-pi.md"
    egress: []
    mounts: []

  # [4/6] herdr-bin -- install herdr binary (TOOL)
  # Must precede herdr MULTIPLEXER and herdr-pi
  # Verbatim from examples/herdr/manifest-fragment.yaml
  - name: herdr-bin
    archetype: TOOL
    version_pin: "v0.7.0"
    install_cmd: "ARCH=$(uname -m) && if [ \"$ARCH\" = \"aarch64\" ]; then TARGET=aarch64; EXPECTED_SHA=77407959c514c25c870bbcc6d2a2c86fef5b5701ed0c7c37745d7412e8563d72; else TARGET=x86_64; EXPECTED_SHA=ad2a5d480a4e04609a9dd30a19ec07854578df6b5f0ea9299246963baf40363b; fi && curl -fsSL \"https://github.com/ogulcancelik/herdr/releases/download/v0.7.0/herdr-linux-${TARGET}\" -o /tmp/herdr && echo \"${EXPECTED_SHA}  /tmp/herdr\" | sha256sum -c - && install -m 755 /tmp/herdr /usr/local/bin/herdr && rm -f /tmp/herdr"
    egress:
      - github.com
    mounts: []

  # [5a/6] herdr MULTIPLEXER -- bake herdr start/attach hooks into registry
  # herdr-bin must precede this entry.
  # Verbatim from examples/herdr/manifest-fragment.yaml
  - name: herdr
    archetype: MULTIPLEXER
    version_pin: "bundled"
    hooks:
      start: "mkdir -p \"${HOME}/.config/herdr\" && herdr server > /tmp/rip-cage-mux-herdr.log 2>&1 & echo \"[rip-cage] herdr server started (PID=$!)\" && sleep 1 && for _agent in pi claude; do if command -v \"${_agent}\" > /dev/null 2>&1; then _out=$(herdr integration install \"${_agent}\" 2>&1); _rc=$?; if [ \"$_rc\" -eq 0 ]; then echo \"[rip-cage] herdr integration installed: ${_agent}\"; else echo \"[rip-cage] WARNING: herdr integration install ${_agent} failed (exit=${_rc}): ${_out}\" >&2; fi; fi; done"
      attach: "herdr"

  # [5b/6] herdr-pi -- generate herdr pi extension + contribute -e launch_arg
  # Contributes launch_args: ["-e", "/etc/rip-cage/pi/herdr-ext/herdr-agent-state.ts"]
  # Verbatim from examples/herdr-pi/manifest-fragment.yaml
  - name: herdr-pi
    archetype: TOOL
    version_pin: "herdr-v0.7.0-integration"
    install_cmd: "mkdir -p /root/.pi/agent/extensions /etc/rip-cage/pi/herdr-ext && herdr integration install pi && cp /root/.pi/agent/extensions/herdr-agent-state.ts /etc/rip-cage/pi/herdr-ext/ && chown -R root:root /etc/rip-cage/pi/herdr-ext && chmod 0644 /etc/rip-cage/pi/herdr-ext/herdr-agent-state.ts && rm -rf /root/.pi"
    egress: []
    mounts:
      - host: "~/.config/herdr"
        dest: "/home/agent/.config/herdr"
        mode: "ro"
    launch_args: ["-e", "/etc/rip-cage/pi/herdr-ext/herdr-agent-state.ts"]

  # [6/6] pi-subagent -- mount + wire the subagent extension
  # Contributes launch_args: ["-e", "/home/agent/.rc-context/pi-ext-subagent/index.ts"]
  # install_cmd is a no-op (:) -- extension is host-projected at rc up time.
  # skip-if-host-missing: if ~/.pi/agent/extensions/subagent/ absent, mount skipped.
  # Verbatim from examples/pi/subagent-fragment.yaml
  - name: pi-subagent
    archetype: TOOL
    version_pin: "bundled-recipe"
    install_cmd: ":"
    egress: []
    mounts:
      - host: "~/.pi/agent/extensions/subagent"
        dest: "/home/agent/.rc-context/pi-ext-subagent"
        mode: "ro"
    launch_args: ["-e", "/home/agent/.rc-context/pi-ext-subagent/index.ts"]
