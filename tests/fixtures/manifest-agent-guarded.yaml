version: 1
tools:
  # Guarded FAKE agent: declares a guard_path on its OWN load path (under the
  # agent's registry dir), NOT a shadow of the safety floor. The floor-lock slot
  # is a declared per-agent asset (ADR-027 D3) — recipe content, not rc policy.
  # A guarded agent is expressible with ZERO rc edits, same as a guard-free one.
  - name: test-agent
    archetype: AGENT
    version_pin: "1.0.0"
    guard_path: "/etc/rip-cage/agents/test-agent/managed-settings.json"
    hooks:
      launch: "exec test-agent --workspace /workspace"
      teardown: "pkill -u agent test-agent || true"
